name: Deploy API server

on:
  push:
    branches:
      - main
    paths:
      - "artifacts/api-server/**"
      - "lib/api-spec/**"
      - "lib/api-zod/**"
      - "lib/db/**"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - "package.json"
      - "tsconfig.base.json"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build → Deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          # Caches the pnpm store keyed on pnpm-lock.yaml hash.
          # Cache hits skip re-downloading packages (~60 s → ~5 s).
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Restore build cache
        id: build-cache
        uses: actions/cache@v4
        with:
          path: |
            artifacts/api-server/dist
            lib/*/dist
          key: build-${{ runner.os }}-${{ hashFiles(
            'artifacts/api-server/src/**',
            'artifacts/api-server/tsconfig.json',
            'artifacts/api-server/build.mjs',
            'lib/*/src/**',
            'lib/*/tsconfig.json',
            'tsconfig.base.json',
            'pnpm-lock.yaml'
            ) }}

      - name: Build API server
        if: steps.build-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @workspace/api-server run build

      - name: Check deploy hook secret
        run: |
          if [ -z "${{ secrets.API_DEPLOY_HOOK_URL }}" ]; then
            echo "::error::API_DEPLOY_HOOK_URL secret is not set. Add it under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Trigger deploy hook
        run: |
          echo "Build succeeded — triggering deploy hook…"
          curl -fsSL \
            --retry 3 \
            --retry-delay 5 \
            -X POST "${{ secrets.API_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
