kind = "mobile"
previewPath = "/"
title = "Sourdough Feed Session"
version = "1.0.0"
id = "artifacts/sourdough"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 21506

[services.development]
run = "pnpm --filter @workspace/sourdough run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sourdough", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/sourdough", "run", "serve" ]

[services.env]
PORT = "21506"
BASE_PATH = "/"
